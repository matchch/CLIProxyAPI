name: upstream-sync

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: router-for-me/CLIProxyAPI
  TARGET_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git

      - name: Resolve latest upstream release tag
        id: resolve_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${UPSTREAM_REPO}/releases?per_page=1"
          release_tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_url}" \
              | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data[0].get("tag_name", "") if data else "")'
          )"

          if [ -z "${release_tag}" ] || [ "${release_tag}" = "null" ]; then
            echo "No upstream release tag found."
            exit 0
          fi

          echo "Detected latest upstream release tag: ${release_tag}"
          echo "upstream_release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream branch and release tag
        if: steps.resolve_release.outputs.upstream_release_tag != ''
        run: |
          set -euo pipefail
          git fetch origin --force --tags
          git fetch upstream --no-tags "${TARGET_BRANCH}:refs/remotes/upstream/${TARGET_BRANCH}"
          git fetch upstream "refs/tags/${{ steps.resolve_release.outputs.upstream_release_tag }}:refs/tags/${{ steps.resolve_release.outputs.upstream_release_tag }}"

      - name: Sync default branch
        if: steps.resolve_release.outputs.upstream_release_tag != ''
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          WORKFLOW_TRIGGER_TOKEN: ${{ secrets.WORKFLOW_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          branch="${BRANCH_NAME:-${GITHUB_REF_NAME:-main}}"
          git checkout "$branch"
          # Keep commit history linear by replaying local commits on top of upstream.
          git rebase "upstream/${branch}"

          if [ -z "${WORKFLOW_TRIGGER_TOKEN:-}" ]; then
            echo "WORKFLOW_TRIGGER_TOKEN not set; refusing to push without FAT."
            exit 1
          fi

          # Ensure push auth comes only from the configured FAT.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${WORKFLOW_TRIGGER_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Rebase rewrites commit history, so update remote with a safe force push.
          git push --force-with-lease origin "$branch"

      - name: Derive fork patch tag
        if: steps.resolve_release.outputs.upstream_release_tag != ''
        id: derive_patch_tag
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          UPSTREAM_RELEASE_TAG: ${{ steps.resolve_release.outputs.upstream_release_tag }}
        run: |
          set -euo pipefail

          branch="${BRANCH_NAME:-${GITHUB_REF_NAME:-main}}"
          patch_base="${UPSTREAM_RELEASE_TAG}-patch"

          git checkout "$branch"

          if ! git merge-base --is-ancestor "upstream/${branch}" HEAD; then
            echo "Current HEAD is not based on upstream/${branch}; refusing to tag."
            exit 1
          fi

          local_commit_count="$(git rev-list --count "upstream/${branch}..HEAD")"
          if [ "$local_commit_count" -eq 0 ]; then
            echo "No fork-only commits after rebase; skipping patch tag creation."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          existing_head_tag="$(git tag --points-at HEAD -l "${patch_base}*")"
          if [ -n "$existing_head_tag" ]; then
            echo "HEAD already tagged with fork patch tag: ${existing_head_tag}"
            echo "patch_tag=${existing_head_tag%%$'\n'*}" >> "$GITHUB_OUTPUT"
            echo "should_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          next_tag="${patch_base}"
          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
            next_number=2
            while git rev-parse -q --verify "refs/tags/${patch_base}${next_number}" >/dev/null || \
                  git rev-parse -q --verify "refs/tags/${patch_base}-${next_number}" >/dev/null; do
              next_number=$((next_number + 1))
            done
            next_tag="${patch_base}${next_number}"
          fi

          echo "Selected fork patch tag: ${next_tag}"
          echo "patch_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "should_push=true" >> "$GITHUB_OUTPUT"

      - name: Push fork patch tag to origin
        if: steps.derive_patch_tag.outputs.should_push == 'true'
        env:
          WORKFLOW_TRIGGER_TOKEN: ${{ secrets.WORKFLOW_TRIGGER_TOKEN }}
          PATCH_TAG: ${{ steps.derive_patch_tag.outputs.patch_tag }}
        run: |
          set -euo pipefail

          if [ -z "${WORKFLOW_TRIGGER_TOKEN:-}" ]; then
            echo "WORKFLOW_TRIGGER_TOKEN not set; refusing to push without FAT."
            exit 1
          fi

          # Ensure tag push also uses only the configured FAT.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${WORKFLOW_TRIGGER_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git tag "${PATCH_TAG}" HEAD
          git push origin "refs/tags/${PATCH_TAG}"
